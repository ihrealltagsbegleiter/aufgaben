name: Plaud ToDos → Supabase

on:
  push:
    paths:
      - 'pending-todos.json'
    branches:
      - main
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: ToDos in Supabase eintragen
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: python3 supabase_sync.py

      - name: pending-todos.json leeren
        if: success()
        run: |
          echo "[]" > pending-todos.json
          git config user.email "plaud-sync@github-actions"
          git config user.name "Plaud Sync Bot"
          git add pending-todos.json
          git diff --staged --quiet || git commit -m "✅ Plaud sync $(date +'%Y-%m-%d %H:%M')"
          git push
